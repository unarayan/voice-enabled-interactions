server:
  host: "0.0.0.0"
  port: 8020

api:
  cors_allow_origins:
    - "http://127.0.0.1"
    - "http://localhost"
  openai_model_name: "smart-kiosk-rag"

models:
  llm:
    hf_id: "Qwen/Qwen2.5-7B-Instruct"
    device: "GPU"
    weight_format: "int8"
    models_base_path: "./models/llm"
    temperature: 0.0
    # Persist compiled GPU kernels so subsequent loads skip JIT compilation.
    cache_dir: "./storage/ov_cache"
  embedding:
    hf_id: "BAAI/bge-large-en-v1.5"
    device: "CPU"
    models_base_path: "./models/embeddings"
    normalize_embeddings: true

storage:
  persist_directory: "./storage/vector_db"
  collection_name: "smart-kiosk-assistant-bge-large"

retrieval:
  top_k: 3
  fetch_k: 6
  # Budget for the retrieved-context block in the prompt (in characters).
  max_context_chars: 5000
  score_threshold: null

chunking:
  # "semantic" (embedding-based, header-aware) | "fixed" (recursive char split)
  # | "llm" (LLM-assisted — slow, needs driver 26.18+, use only for unstructured corpora)
  strategy: "llm"
  max_chunk_chars: 1200
  min_chunk_chars: 200
  overlap_chars: 150
  semantic_similarity_threshold: 0.72
  # LLM chunking settings — only used when strategy: llm
  llm:
    # Characters per passage sent to the LLM. Keep well below the GPU token ceiling.
    # passage_chars / 4 ≈ rough token estimate. 4000 chars ≈ 1000 tokens.
    passage_chars: 4000
    # Max new tokens the LLM may generate per passage (JSON array of chunks).
    max_tokens: 512

answering:
  system_prompt: |
    You are Smart Kiosk Assistant for a retail store.
    Use the retrieved context first. Answer clearly, directly, and in a way that can be spoken aloud.
    If the context is insufficient, say what you do know and avoid inventing store-specific facts.
  fallback_to_general_knowledge: true
  include_source_markers: false
  max_tokens: 192
